name: Coletar Top 10 Streaming

on:
  workflow_dispatch:

  schedule:
    - cron: "50 15 * * *"

jobs:
  coleta:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Instalar pacotes do R
        run: |
          Rscript -e 'install.packages(c("rvest", "dplyr", "stringr", "tibble", "purrr", "readr", "lubridate", "googlesheets4", "gargle"), repos = "https://cloud.r-project.org")'

      - name: Verificar pacotes instalados
        run: |
          Rscript -e 'library(googlesheets4); library(rvest); library(dplyr); print("Pacotes carregados com sucesso")'

      - name: Criar credencial Google
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Rodar coleta
        run: |
          Rscript coleta_top10.R
